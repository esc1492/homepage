<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>시작 페이지</title>
<style>
/* === Design Tokens === */
:root {
  --color-canvas-parchment: #f7f7f4;
  --color-inkwell: #262510;
  --color-muted-stone: #7a7974;
  --color-deep-shadow: #141414;
  --color-pebble-gray: #e6e5e0;
  --color-onyx-outline: #f54e00;
  --color-chartreuse-alert: #4ade80;
  --color-goldenrod-accent: #c08532;
  --color-forest-green-action: #34785c;
  --color-highlight-beige: #cdcdc9;

  --font-primary: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;

  --spacing-4: 4px;
  --spacing-6: 6px;
  --spacing-8: 8px;
  --spacing-10: 10px;
  --spacing-12: 12px;
  --spacing-16: 16px;
  --spacing-20: 20px;
  --spacing-22: 22px;
  --spacing-28: 28px;
  --spacing-43: 43px;
  --spacing-67: 67px;

  --page-max-width: 1300px;
  --section-gap: 43px;
  --card-padding: 12px;
  --element-gap: 8px;

  --radius-sm: 1.5px;
  --radius-cards: 4px;
  --radius-buttons: 4px;
  --radius-prominent: 8px;

  --shadow-xl: rgba(0, 0, 0, 0.14) 0px 28px 70px 0px, rgba(0, 0, 0, 0.1) 0px 14px 32px 0px, oklab(0.263084 -0.00230259 0.0124794 / 0.1) 0px 0px 0px 1px;
  --shadow-subtle: oklab(0.263084 -0.00230259 0.0124794 / 0.1) 0px 0px 0px 1px, rgba(0, 0, 0, 0.28) 0px 18px 36px -18px;

  --surface-0: #f7f7f4;
  --surface-1: #e6e5e0;
  --surface-2: #cdcdc9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-primary);
  background: var(--color-canvas-parchment);
  color: var(--color-inkwell);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  width: 100%;
}

.wrap {
  max-width: var(--page-max-width);
  margin: 0 auto;
  padding: var(--spacing-43) var(--spacing-20);
  width: 100%;
}

/* === Layout === */
.layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: var(--spacing-20);
  align-items: start;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--spacing-20);
}

.sidebar {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-20);
}

/* === Card === */
.card {
  background: var(--color-pebble-gray);
  border-radius: var(--radius-prominent);
  padding: var(--card-padding);
  box-shadow: var(--shadow-xl);
  min-width: 0;
}

.card-title {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-muted-stone);
  margin-bottom: var(--spacing-12);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* === Buttons === */
.btn-ghost {
  font-size: 10px;
  font-weight: 400;
  color: var(--color-muted-stone);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: var(--radius-buttons);
  transition: color 150ms;
}
.btn-ghost:hover { color: var(--color-inkwell); }

.btn-outline {
  font-size: 12px;
  font-weight: 400;
  color: var(--color-onyx-outline);
  background: transparent;
  border: 1px solid var(--color-onyx-outline);
  border-radius: var(--radius-buttons);
  padding: 6px 10px;
  cursor: pointer;
  transition: background 150ms, color 150ms;
  white-space: nowrap;
}
.btn-outline:hover {
  background: var(--color-onyx-outline);
  color: var(--color-canvas-parchment);
}

/* === Weather === */
.weather-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--spacing-12);
}

.weather-col-label {
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-muted-stone);
  margin-bottom: var(--spacing-8);
}

.weather-main {
  display: flex;
  align-items: center;
  gap: var(--spacing-12);
  margin-bottom: var(--spacing-8);
}

.weather-icon { font-size: 36px; line-height: 1; }

.weather-temp {
  font-size: 36px;
  font-weight: 500;
  line-height: 1;
  color: var(--color-inkwell);
}

.weather-sub {
  font-size: 12px;
  color: var(--color-muted-stone);
  margin-top: 2px;
}

.weather-minmax {
  font-size: 11px;
  color: var(--color-forest-green-action);
  margin-top: var(--spacing-4);
}

.weather-detail {
  display: flex;
  gap: var(--spacing-8);
  margin-top: var(--spacing-10);
  padding-top: var(--spacing-10);
  border-top: 1px solid var(--color-highlight-beige);
}

.wi { flex: 1; text-align: center; }
.wi-label { font-size: 10px; letter-spacing: 0.04em; color: var(--color-muted-stone); display: block; }
.wi-value { font-size: 12px; font-weight: 500; color: var(--color-inkwell); margin-top: 2px; display: block; }

.weather-tomorrow-col {
  border-left: 1px solid var(--color-highlight-beige);
  padding-left: var(--spacing-12);
}

.weather-weekly-section {
  margin-top: var(--spacing-16);
  padding-top: var(--spacing-16);
  border-top: 1px solid var(--color-highlight-beige);
}

#weekly-weather {
  display: flex;
  gap: var(--spacing-10);
  overflow-x: auto;
  padding-bottom: var(--spacing-8);
  scrollbar-width: thin;
  scrollbar-color: var(--color-highlight-beige) transparent;
}

.ww-item {
  flex: 0 0 auto;
  width: 58px;
  text-align: center;
  padding: var(--spacing-8) var(--spacing-6);
  background: var(--color-canvas-parchment);
  border-radius: var(--radius-cards);
}

.ww-day {
  font-size: 11px;
  color: var(--color-muted-stone);
  margin-bottom: var(--spacing-4);
  font-weight: 500;
}

.ww-icon { font-size: 22px; line-height: 1; margin-bottom: var(--spacing-4); display: block; }

.ww-desc {
  font-size: 10px;
  color: var(--color-muted-stone);
  line-height: 1.2;
}

/* === Stocks === */
.stock-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--spacing-8) 0;
  border-bottom: 1px solid var(--color-highlight-beige);
  cursor: pointer;
  transition: opacity 150ms;
}
.stock-row:last-child { border-bottom: none; }
.stock-row:hover { opacity: 0.7; }

.sname { font-size: 13px; font-weight: 500; color: var(--color-inkwell); }
.sticker { font-size: 10px; color: var(--color-muted-stone); margin-top: 1px; letter-spacing: 0.04em; }
.sright { text-align: right; }
.sprice { font-size: 14px; font-weight: 500; color: var(--color-inkwell); font-variant-numeric: tabular-nums; }
.schange { font-size: 11px; margin-top: 1px; font-variant-numeric: tabular-nums; }
.up { color: var(--color-forest-green-action); }
.dn { color: #c94a3a; }
.flat { color: var(--color-muted-stone); }

.updated {
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--color-muted-stone);
  text-align: right;
  margin-top: var(--spacing-8);
}

/* === News === */
.news-item {
  padding: var(--spacing-8) 0;
  border-bottom: 1px solid var(--color-highlight-beige);
}
.news-item:last-child { border-bottom: none; }

.ntag {
  display: inline-block;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  margin-bottom: var(--spacing-4);
  text-transform: uppercase;
}

.tag-world { background: #e0ece5; color: #2d6a4f; }
.tag-eco { background: #f5ede0; color: #9c6b2e; }
.tag-tech { background: #eaedf2; color: #3a5a8c; }
.tag-local { background: #eee8f0; color: #6b4c80; }

.nhead {
  font-size: 13px;
  line-height: 1.5;
  color: var(--color-inkwell);
  font-weight: 500;
}

.nsum {
  font-size: 12px;
  color: var(--color-muted-stone);
  margin-top: 3px;
  line-height: 1.5;
}

.ntime {
  font-size: 10px;
  color: var(--color-muted-stone);
  margin-top: var(--spacing-4);
  letter-spacing: 0.04em;
}

.ai-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--color-onyx-outline);
  border: 1px solid var(--color-onyx-outline);
  border-radius: var(--radius-sm);
  padding: 1px 5px;
  margin-left: 6px;
  vertical-align: middle;
}

.msg {
  font-size: 12px;
  color: var(--color-muted-stone);
  padding: var(--spacing-10) 0;
  text-align: center;
}

/* === Todo === */
.todo-input-wrap {
  display: flex;
  gap: var(--spacing-8);
  margin-bottom: var(--spacing-12);
}

.todo-input {
  flex: 1;
  font-family: var(--font-primary);
  font-size: 12px;
  color: var(--color-inkwell);
  background: transparent;
  border: 1px solid var(--color-muted-stone);
  border-radius: 0;
  padding: 6px var(--spacing-8);
  outline: none;
  transition: border-color 150ms;
}
.todo-input::placeholder { color: var(--color-muted-stone); opacity: 0.6; }
.todo-input:focus { border-color: var(--color-inkwell); }

.todo-row {
  display: flex;
  align-items: center;
  gap: var(--spacing-8);
  padding: var(--spacing-6) 0;
  border-bottom: 1px solid var(--color-highlight-beige);
}
.todo-row:last-child { border-bottom: none; }

.todo-row input[type="checkbox"] {
  width: 14px;
  height: 14px;
  cursor: pointer;
  accent-color: var(--color-forest-green-action);
  flex-shrink: 0;
}

.todo-text {
  flex: 1;
  font-size: 13px;
  color: var(--color-inkwell);
}
.todo-text.done {
  text-decoration: line-through;
  color: var(--color-muted-stone);
}

.todo-del {
  font-size: 11px;
  color: var(--color-muted-stone);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  opacity: 0.5;
  transition: opacity 150ms;
  line-height: 1;
}
.todo-del:hover { opacity: 1; }

.todo-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: var(--spacing-12);
  padding-top: var(--spacing-12);
  border-top: 1px solid var(--color-highlight-beige);
}

.todo-count {
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--color-muted-stone);
}

.todo-clear {
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--color-muted-stone);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
  transition: color 150ms;
}
.todo-clear:hover { color: var(--color-inkwell); }

/* === Responsive === */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .grid { grid-template-columns: 1fr; }
  .weather-split { grid-template-columns: 1fr; }
  .weather-tomorrow-col { border-left: none; padding-left: 0; padding-top: var(--spacing-12); }
  .wrap { padding: var(--spacing-20) var(--spacing-12); }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="layout">
    <div class="grid">
      <!-- Weather -->
      <article class="card">
        <div class="card-title"><span>날씨 · 서울</span><button class="btn-ghost" onclick="loadWeather()">새로고침</button></div>
        <div class="weather-split">
          <div>
            <div class="weather-col-label">오늘</div>
            <div class="weather-main">
              <span class="weather-icon" id="wicon">⛅</span>
              <div>
                <div class="weather-temp" id="wtemp">–°C</div>
                <div class="weather-sub" id="wdesc">불러오는 중...</div>
                <div class="weather-minmax" id="wminmax"></div>
              </div>
            </div>
            <div class="weather-detail">
              <div class="wi"><span class="wi-label">미세먼지</span><span class="wi-value" id="wpm10">–</span></div>
              <div class="wi"><span class="wi-label">초미세먼지</span><span class="wi-value" id="wpm25">–</span></div>
            </div>
          </div>
          <div class="weather-tomorrow-col">
            <div class="weather-col-label">내일</div>
            <div class="weather-main">
              <span class="weather-icon" id="wicon2">⛅</span>
              <div>
                <div class="weather-temp" id="wtemp2">–°C</div>
                <div class="weather-sub" id="wdesc2">불러오는 중...</div>
                <div class="weather-minmax" id="wminmax2"></div>
              </div>
            </div>
            <div class="weather-detail">
              <div class="wi"><span class="wi-label">강수확률</span><span class="wi-value" id="wrain2">–</span></div>
              <div class="wi"><span class="wi-label">습도</span><span class="wi-value" id="whumid2">–</span></div>
            </div>
          </div>
        </div>
        <div class="weather-weekly-section">
          <div class="weather-col-label">일주일간 날씨</div>
          <div id="weekly-weather"></div>
        </div>
      </article>

      <!-- Stocks -->
      <article class="card">
        <div class="card-title"><span>관심 종목</span><button class="btn-ghost" onclick="loadStocks()">새로고침</button></div>
        <div id="stock-list"><div class="msg">불러오는 중...</div></div>
        <div class="updated" id="stock-time"></div>
      </article>

      <!-- General News -->
      <article class="card">
        <div class="card-title"><span>주요 뉴스 <span class="ai-badge">실시간</span></span><button class="btn-ghost" onclick="loadNews('general')">새로고침</button></div>
        <div id="news-general"><div class="msg">불러오는 중...</div></div>
      </article>

      <!-- Tech News -->
      <article class="card">
        <div class="card-title"><span>기술·IT 뉴스 <span class="ai-badge">실시간</span></span><button class="btn-ghost" onclick="loadNews('tech')">새로고침</button></div>
        <div id="news-tech"><div class="msg">불러오는 중...</div></div>
      </article>
    </div>

    <div class="sidebar">
      <!-- Personal Todos -->
      <article class="card">
        <div class="card-title"><span>나의 오늘의 할 일</span></div>
        <div class="todo-input-wrap">
          <input id="my-todo-inp" type="text" placeholder="할 일 입력..." class="todo-input" />
          <button onclick="addMyTodo()" class="btn-outline">추가</button>
        </div>
        <div id="my-todo-list"></div>
        <div class="todo-footer">
          <span class="todo-count" id="my-todo-count"></span>
          <button onclick="clearMyDone()" class="todo-clear">완료 항목 삭제</button>
        </div>
      </article>

      <!-- Family Todos -->
      <article class="card">
        <div class="card-title"><span>우리 가족의 할 일</span></div>
        <div class="todo-input-wrap">
          <input id="todo-inp" type="text" placeholder="할 일 입력..." class="todo-input" />
          <button onclick="addTodo()" class="btn-outline">추가</button>
        </div>
        <div id="todo-list"></div>
        <div class="todo-footer">
          <span class="todo-count" id="todo-count"></span>
          <button onclick="clearDone()" class="todo-clear">완료 항목 삭제</button>
        </div>
      </article>
    </div>
  </div>
</div>

<script>
function getAirGrade(val,type){
  if(type==='pm10'){
    if(val<=30) return {text:'좋음',color:'#34785c'};
    if(val<=80) return {text:'보통',color:'#3a7abd'};
    if(val<=150) return {text:'나쁨',color:'#c08532'};
    return {text:'매우나쁨',color:'#c94a3a'};
  } else {
    if(val<=15) return {text:'좋음',color:'#34785c'};
    if(val<=35) return {text:'보통',color:'#3a7abd'};
    if(val<=75) return {text:'나쁨',color:'#c08532'};
    return {text:'매우나쁨',color:'#c94a3a'};
  }
}

function loadWeather(){
  document.getElementById('wdesc').textContent='불러오는 중...';
  document.getElementById('wdesc2').textContent='불러오는 중...';
  var icons={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'🌨',80:'🌦',81:'🌧',82:'🌧',95:'⛈',96:'⛈',99:'⛈'};
  var descs={0:'맑음',1:'대체로 맑음',2:'약간 흐림',3:'흐림',45:'안개',48:'안개',51:'가벼운 이슬비',53:'이슬비',55:'짙은 이슬비',61:'약한 비',63:'비',65:'강한 비',71:'약한 눈',73:'눈',75:'강한 눈',80:'소나기',81:'강한 소나기',82:'폭우',95:'뇌우',96:'뇌우(우박)',99:'강한 뇌우'};
  fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max,relative_humidity_2m_max&wind_speed_unit=ms&timezone=Asia%2FSeoul')
  .then(function(r){return r.json();})
  .then(function(d){
    var c=d.current;
    document.getElementById('wicon').textContent=icons[c.weather_code]||'🌡';
    document.getElementById('wtemp').textContent=Math.round(c.temperature_2m)+'°C';
    document.getElementById('wdesc').textContent=descs[c.weather_code]||'날씨 정보';
    document.getElementById('wminmax').textContent='최고 '+Math.round(d.daily.temperature_2m_max[0])+'° / 최저 '+Math.round(d.daily.temperature_2m_min[0])+'°';
    document.getElementById('wicon2').textContent=icons[d.daily.weather_code[1]]||'🌡';
    document.getElementById('wtemp2').textContent=Math.round((d.daily.temperature_2m_max[1]+d.daily.temperature_2m_min[1])/2)+'°C';
    document.getElementById('wdesc2').textContent=descs[d.daily.weather_code[1]]||'날씨 정보';
    document.getElementById('wminmax2').textContent='최고 '+Math.round(d.daily.temperature_2m_max[1])+'° / 최저 '+Math.round(d.daily.temperature_2m_min[1])+'°';
    document.getElementById('wrain2').textContent=(d.daily.precipitation_probability_max[1]||0)+'%';
    document.getElementById('whumid2').textContent=(d.daily.relative_humidity_2m_max[1]||0)+'%';
    var weeklyEl = document.getElementById('weekly-weather');
    if (weeklyEl) {
      weeklyEl.innerHTML = '';
      var days = ['일', '월', '화', '수', '목', '금', '토'];
      for (var i = 0; i < 7; i++) {
        var date = new Date();
        date.setDate(date.getDate() + i);
        var dayName = days[date.getDay()];
        var weatherCode = d.daily.weather_code && d.daily.weather_code[i];
        var icon = icons[weatherCode] || '🌡';
        var desc = descs[weatherCode] || '날씨 정보';
        var item = document.createElement('div');
        item.className = 'ww-item';
        item.innerHTML = '<div class="ww-day">' + dayName + '</div>' +
                         '<span class="ww-icon">' + icon + '</span>' +
                         '<div class="ww-desc">' + desc + '</div>';
        weeklyEl.appendChild(item);
      }
    }
  })
  .catch(function(){
    document.getElementById('wdesc').textContent='날씨 정보를 불러올 수 없습니다';
    document.getElementById('wdesc2').textContent='날씨 정보를 불러올 수 없습니다';
    var weeklyEl = document.getElementById('weekly-weather');
    if (weeklyEl) weeklyEl.innerHTML = '<div class="msg">일주일간 날씨를 불러올 수 없습니다</div>';
  });
  fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=37.5665&longitude=126.9780&current=pm10,pm2_5&timezone=Asia%2FSeoul')
  .then(function(r){return r.json();})
  .then(function(d){
    var pm10=Math.round(d.current.pm10);
    var pm25=Math.round(d.current.pm2_5);
    var g10=getAirGrade(pm10,'pm10');
    var g25=getAirGrade(pm25,'pm25');
    document.getElementById('wpm10').innerHTML=pm10+'㎍ <span style="color:'+g10.color+';font-size:11px">'+g10.text+'</span>';
    document.getElementById('wpm25').innerHTML=pm25+'㎍ <span style="color:'+g25.color+';font-size:11px">'+g25.text+'</span>';
  })
  .catch(function(){
    document.getElementById('wpm10').textContent='–';
    document.getElementById('wpm25').textContent='–';
  });
}
loadWeather();

var STOCKS=[
  {ticker:'005930',name:'삼성전자'},
  {ticker:'034020',name:'두산에너빌리티'},
  {ticker:'035420',name:'NAVER'},
  {ticker:'018260',name:'삼성에스디에스'},
  {ticker:'064400',name:'LG씨엔에스'},
  {ticker:'064350',name:'현대로템'},
];
function loadStocks(){
  var el=document.getElementById('stock-list');
  el.innerHTML='<div class="msg">불러오는 중...</div>';
  fetch('./data.json?t='+Date.now())
  .then(function(r){return r.json();})
  .then(function(json){
    var stocks=json.stocks;
    if(!stocks||!Object.keys(stocks).length){
      el.innerHTML='<div class="msg">데이터를 불러올 수 없습니다.</div>';
      return;
    }
    el.innerHTML=STOCKS.map(function(s){
      var d=stocks[s.ticker];
      if(!d||!d.closePrice) return '<div class="stock-row"><div><div class="sname">'+s.name+'</div><div class="sticker">'+s.ticker+'</div></div><div class="sright"><div class="schange flat">–</div></div></div>';
      var rate=parseFloat(d.fluctuationsRatio)||0;
      var code=d.compareToPreviousPrice?d.compareToPreviousPrice.code:'';
      var up=code==='2'||code==='1';
      var dn=code==='5'||code==='4';
      var cls=up?'up':dn?'dn':'flat';
      var sign=up?'+':'';
      return '<div class="stock-row" onclick="window.open(\'https://m.stock.naver.com/domestic/stock/'+s.ticker+'\',\'_blank\')">'
        +'<div><div class="sname">'+d.stockName+'</div><div class="sticker">'+s.ticker+'</div></div>'
        +'<div class="sright"><div class="sprice">'+d.closePrice+'원</div>'
        +'<div class="schange '+cls+'">'+sign+rate.toFixed(2)+'% ('+d.compareToPreviousClosePrice+')</div></div></div>';
    }).join('');
    var updated=new Date(json.updated);
    var t=updated.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    document.getElementById('stock-time').textContent=t+' 기준 · 장중 10분 자동 업데이트';
  })
  .catch(function(e){
    el.innerHTML='<div class="msg">데이터를 불러올 수 없습니다.</div>';
    console.error(e);
  });
}
loadStocks();

function loadNews(type){
  fetch('./data.json?t='+Date.now())
  .then(function(r){return r.json();})
  .then(function(json){
    var news=json.news;
    var tagLabel={world:'세계',eco:'경제',tech:'기술',local:'국내'};
    var items=[];
    if(type==='general'){
      ['eco','world','local'].forEach(function(cat){
        if(news[cat]&&news[cat].length){
          news[cat].slice(0,2).forEach(function(n){
            items.push({tag:cat,head:n.title,sum:n.desc,time:n.pubDate,link:n.link});
          });
        }
      });
      items=items.slice(0,4);
    } else {
      if(news.tech&&news.tech.length){
        news.tech.forEach(function(n){
          items.push({tag:'tech',head:n.title,sum:n.desc,time:n.pubDate,link:n.link});
        });
      }
      items=items.slice(0,4);
    }
    var elId=type==='general'?'news-general':'news-tech';
    document.getElementById(elId).innerHTML=items.map(function(n){
      var link=n.link?n.link.replace(/<!\[CDATA\[|\]\]>/g,'').trim():'';
      return '<div class="news-item"'+(link?' onclick="window.open(\''+link+'\',\'_blank\')" style="cursor:pointer"':'')+'>'+
        '<span class="ntag tag-'+n.tag+'">'+tagLabel[n.tag]+'</span>'+
        '<div class="nhead">'+n.head+'</div>'+
        (n.sum?'<div class="nsum">'+n.sum+'</div>':'')+
        '<div class="ntime">'+n.time+'</div></div>';
    }).join('');
  })
  .catch(function(){
    var fallback=type==='general'?NEWS_STATIC.general:NEWS_STATIC.tech;
    var tagLabel={world:'세계',eco:'경제',tech:'기술',local:'국내'};
    var elId=type==='general'?'news-general':'news-tech';
    document.getElementById(elId).innerHTML=fallback.map(function(n){
      return '<div class="news-item">'+
        '<span class="ntag tag-'+n.tag+'">'+tagLabel[n.tag]+'</span>'+
        '<div class="nhead">'+n.head+'</div>'+
        '<div class="nsum">'+n.sum+'</div>'+
        '<div class="ntime">'+n.time+'</div></div>';
    }).join('');
  });
}
loadNews('general');
loadNews('tech');

var SCRIPT_URL='https://script.google.com/macros/s/AKfycbwT5m4gBvs7_WpM9UmE1A7BfI6sLrfuI1yKxDHY0no3s-MHsA6nW8bFiarS1EEv5sNiRA/exec';
var myTodos=JSON.parse(localStorage.getItem('myTodos')||'[]');
function saveMyTodos(){localStorage.setItem('myTodos',JSON.stringify(myTodos));}
function renderMyTodos(){
  var el=document.getElementById('my-todo-list');
  if(!myTodos.length){
    el.innerHTML='<div class="msg">할 일을 추가해 주세요.</div>';
    document.getElementById('my-todo-count').textContent='';
    return;
  }
  el.innerHTML=myTodos.map(function(t,i){
    return '<div class="todo-row">'
      +'<input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleMyTodo('+i+')">'
      +'<span class="todo-text'+(t.done?' done':'')+'">'+t.text+'</span>'
      +'<button class="todo-del" onclick="deleteMyTodo('+i+')">✕</button>'
      +'</div>';
  }).join('');
  var done=myTodos.filter(function(t){return t.done;}).length;
  document.getElementById('my-todo-count').textContent=done+'/'+myTodos.length+' 완료';
}
function addMyTodo(){
  var inp=document.getElementById('my-todo-inp');
  var text=inp.value.trim();
  if(!text) return;
  myTodos.push({text:text,done:false});
  saveMyTodos();
  renderMyTodos();
  inp.value='';
}
function toggleMyTodo(i){
  myTodos[i].done=!myTodos[i].done;
  saveMyTodos();
  renderMyTodos();
}
function deleteMyTodo(i){
  myTodos.splice(i,1);
  saveMyTodos();
  renderMyTodos();
}
function clearMyDone(){
  myTodos=myTodos.filter(function(t){return !t.done;});
  saveMyTodos();
  renderMyTodos();
}
document.getElementById('my-todo-inp').addEventListener('keydown',function(e){if(e.key==='Enter')addMyTodo();});
renderMyTodos();

function loadTodosFromGithub(){
  fetch(SCRIPT_URL+'?action=getAll')
  .then(function(r){return r.json();})
  .then(function(data){
    todos=data||[];
    renderTodos();
  })
  .catch(function(){
    todos=[];
    renderTodos();
  });
}

function saveTodosToGithub(action,payload){
  var body=Object.assign({action:action},payload);
  fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify(body)
  }).catch(function(e){console.error('Todo 저장 실패:',e);});
}
function renderTodos(){
  var el=document.getElementById('todo-list');
  if(!todos.length){
    el.innerHTML='<div class="msg">할 일을 추가해 주세요.</div>';
    document.getElementById('todo-count').textContent='';
    return;
  }
  el.innerHTML=todos.map(function(t,i){
    return '<div class="todo-row">'
      +'<input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleTodo('+i+')">'
      +'<span class="todo-text'+(t.done?' done':'')+'">'+t.text+'</span>'
      +'<button class="todo-del" onclick="deleteTodo('+i+')">✕</button>'
      +'</div>';
  }).join('');
  var done=todos.filter(function(t){return t.done;}).length;
  document.getElementById('todo-count').textContent=done+'/'+todos.length+' 완료';
}
function addTodo(){
  var inp=document.getElementById('todo-inp');
  var text=inp.value.trim();
  if(!text) return;
  var newTodo={id:Date.now().toString(),text:text,done:false};
  todos.push(newTodo);
  renderTodos();
  inp.value='';
  saveTodosToGithub('add',{text:text});
}
function toggleTodo(i){
  todos[i].done=!todos[i].done;
  renderTodos();
  saveTodosToGithub('toggle',{id:todos[i].id});
}
function deleteTodo(i){
  var id=todos[i].id;
  todos.splice(i,1);
  renderTodos();
  saveTodosToGithub('delete',{id:id});
}
function clearDone(){
  todos=todos.filter(function(t){return !t.done;});
  renderTodos();
  saveTodosToGithub('clearDone',{});
}
document.getElementById('todo-inp').addEventListener('keydown',function(e){if(e.key==='Enter')addTodo();});
loadTodosFromGithub();
</script>
