name: Update Stocks and News

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stock and news data
        run: |
          fetch_stock() {
            curl -s "https://m.stock.naver.com/api/stock/${1}/basic"
          }

          fetch_news() {
            curl -s "https://news.naver.com/main/rss/index.naver?oid=${1}" | \
            python3 -c "
import sys, re, json, html

content = sys.stdin.read()
items = re.findall(r'<item>(.*?)</item>', content, re.DOTALL)
result = []
for item in items[:5]:
    title = re.search(r'<title>(.*?)</title>', item)
    link = re.search(r'<link>(.*?)</link>', item)
    desc = re.search(r'<description>(.*?)</description>', item)
    pubdate = re.search(r'<pubDate>(.*?)</pubDate>', item)
    if title:
        t = html.unescape(re.sub(r'<[^>]+>', '', title.group(1))).strip()
        l = link.group(1).strip() if link else ''
        d = html.unescape(re.sub(r'<[^>]+>', '', desc.group(1))).strip()[:100] if desc else ''
        p = pubdate.group(1).strip() if pubdate else ''
        result.append({'title': t, 'link': l, 'desc': d, 'pubDate': p})
print(json.dumps(result, ensure_ascii=False))
"
          }

          S1=$(fetch_stock "005930")
          S2=$(fetch_stock "009150")
          S3=$(fetch_stock "034020")
          S4=$(fetch_stock "035420")

          # 네이버 뉴스 RSS (100: 정치, 101: 경제, 102: 사회, 105: IT/과학)
          NEWS_ECO=$(fetch_news "101")
          NEWS_WORLD=$(fetch_news "104")
          NEWS_TECH=$(fetch_news "105")
          NEWS_LOCAL=$(fetch_news "102")

          python3 -c "
import json, sys

stocks = {
  '005930': ${S1},
  '009150': ${S2},
  '034020': ${S3},
  '035420': ${S4}
}

news = {
  'eco': ${NEWS_ECO},
  'world': ${NEWS_WORLD},
  'tech': ${NEWS_TECH},
  'local': ${NEWS_LOCAL}
}

import datetime
updated = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')

data = {'stocks': stocks, 'news': news, 'updated': updated}
print(json.dumps(data, ensure_ascii=False, indent=2))
" > data.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update stock and news data"
          git push
